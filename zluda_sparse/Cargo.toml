[package]
name = "zluda_sparse"
version = "0.0.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]
name = "cusparse"

[dependencies]
cuda_macros = { path = "../cuda_macros" }
cuda_types = { path = "../cuda_types" }
rocsparse-sys = { path = "../ext/rocsparse-sys" }
zluda_common = { path = "../zluda_common" }

[package.metadata.zluda]
linux_symlinks = ["libcusparse.so.10", "libcusparse.so.11", "libcusparse.so.12"]
windows_paths = ["cusparse64_10.dll", "cusparse64_11.dll", "cusparse64_12.dll"]

[target.'cfg(windows)'.dependencies]
zluda_windows = { path = "../zluda_windows" }
libloading = "0.8"

[target.'cfg(windows)'.build-dependencies]
embed-resource = "3.0"

